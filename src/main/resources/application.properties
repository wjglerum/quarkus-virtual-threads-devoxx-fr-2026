quarkus.http.access-log.enabled=true
quarkus.http.access-log.exclude-pattern=/q/.*
quarkus.micrometer.export.json.enabled=true
quarkus.micrometer.export.prometheus.enabled=true

# Observability DevServices (Grafana LGTM stack auto-starts in dev mode)
%dev.quarkus.observability.enabled=true

# Make thread exhaustion visible quickly during the demo
%dev.quarkus.thread-pool.max-threads=20
%dev.quarkus.thread-pool.queue-size=10

# Surface virtual thread pinning in dev logs
%dev.quarkus.jvm.args=-Djdk.tracePinnedThreads=short

# WireMock DevService — stubs loaded from classpath:wiremock/__mappings/
# In test mode, src/test/resources/wiremock takes precedence (100ms delay).
# In dev mode, src/main/resources/wiremock is used (3000ms delay).
quarkus.wiremock.devservices.files-mapping=classpath:wiremock
quarkus.rest-client.coffee-machine.url=http://localhost:${quarkus.wiremock.devservices.port}

%dev.bartender.delay=3s
%test.bartender.delay=0.1s
